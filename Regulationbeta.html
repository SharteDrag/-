<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ランダム画像抽選（A-Z対応）</title>
<style>
  body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
  .container { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  input[type=number] { width: 60px; padding: 5px; }
  button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; font-weight: bold; margin: 5px; }
  button:hover { background: #0056b3; }
  
  /* 結果表示エリア（ここが重要！） */
  #result { 
    margin-top: 20px; 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
    gap: 10px; 
    padding: 10px;
    background: #fff;
    min-height: 100px;
    border-radius: 10px;
  }
  #result img { 
    width: 100px; height: 100px;
    border-radius: 8px; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    object-fit: cover;
    object-position: left;
  }
  .error-msg { color: red; margin: 10px; }
</style>
</head>
<body>

<div class="container">
  <h1>レギュレーションβ</h1>
  
  <label>グループ選択：</label>
  <select id="groupSelect">
    <option value="all">準伝説あり</option>
    <option value="ae">一般グループ</option>
    <option value="fj">リトルグループ</option>
  </select>

  <label>抽選枚数：</label>
  <input type="number" id="countInput" value="50" min="1">
  <button onclick="startDraw()">抽選開始</button>
  <button onclick="saveAsImage()" style="background: #28a745;">PNGで保存</button>
  <div id="message"></div>
</div>

<div id="result"></div>

function startDraw() {
  const resultDiv = document.getElementById("result");
  const msg = document.getElementById("message");
  const countInput = document.getElementById("countInput");
  const groupSelect = document.getElementById("groupSelect");
  
  // resultDiv が存在するかチェック
  if (!resultDiv) {
    console.error("エラー: id='result' の要素が見つかりません。HTMLを確認してください。");
    return;
  }
  
  const count = parseInt(countInput.value) || 0;
  const selectedGroup = groupSelect.value;
  
  resultDiv.innerHTML = "";

  const currentList = imageCollections[selectedGroup];
  const candidateImages = currentList.filter(path => !excludeList.includes(path));

  if (candidateImages.length === 0) {
    msg.innerHTML = "<span class='error-msg'>候補となる画像がありません。</span>";
    return;
  }

  const shuffled = [...candidateImages];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  
  const selected = shuffled.slice(0, count);

  selected.forEach(path => {
    const img = document.createElement("img");
    img.src = BASE_PATH + path;
    img.alt = path;
    img.onerror = () => { img.style.display = "none"; };
    resultDiv.appendChild(img);
  });

  msg.textContent = `全 ${candidateImages.length} 枚中、${selected.length} 枚を表示しました。`;
}

async function saveAsImage() {
  const result = document.getElementById("result");
  if (!result || !result.hasChildNodes()) {
    alert("先に抽選してください");
    return;
  }

  try {
    const canvas = await html2canvas(result, { 
      useCORS: true, 
      scale: 2,
      backgroundColor: "#ffffff"
    });
    const link = document.createElement("a");
    link.download = "抽選結果.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  } catch (err) {
    console.error(err);
    alert("画像の保存に失敗しました。");
  }
}

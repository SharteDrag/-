    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // ハッシュ化（SHA-256）を行う関数
  async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  const firebaseConfig = {
    apiKey: "AIzaSyCyVyusuBQkiDwEzcfAaLeLS1YSiiGTNS4",
    authDomain: "sharte-tool-management.firebaseapp.com",
    projectId: "sharte-tool-management",
    storageBucket: "sharte-tool-management.firebasestorage.app",
    messagingSenderId: "434296791195",
    appId: "1:434296791195:web:1b4a23a0529257d378e63e",
    measurementId: "G-GHCLZB8YK0"
  };

  // ★「JASRAC」をハッシュ化した値（これを見ても元の文字は推測困難）
  const HASHED_MASTER_PASSWORD = "3e36e885c4974f178768019b1652438867a5b3a4a284e6a0d33e721a36746869"; 

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const overlay = document.getElementById('auth-overlay');
  const content = document.getElementById('protected-content');

  document.getElementById('btn-login').onclick = () => {
    signInWithPopup(auth, provider).catch(err => alert("エラー: " + err.message));
  };

  onAuthStateChanged(auth, async (user) => { // asyncを追加
    if (user) {
      const storageKey = `auth_verified_${user.uid}`;
      if (localStorage.getItem(storageKey) === 'true') {
        overlay.style.display = 'none';
        content.style.display = 'block';
      } else {
        setTimeout(async () => {
          const inputPass = prompt("【初回認証】\n最新のパスワードを入力してください：");
          if (inputPass) {
            // 入力された値をハッシュ化して比較
            const inputHashed = await hashPassword(inputPass.trim());
            if (inputHashed === HASHED_MASTER_PASSWORD) {
              localStorage.setItem(storageKey, 'true');
              overlay.style.display = 'none';
              content.style.display = 'block';
              return;
            }
          }
          alert("パスワードが正しくありません。");
          auth.signOut();
        }, 800);
      }
    } else {
      overlay.style.display = 'flex';
      content.style.display = 'none';
    }
  });
</script>

let db = { species: [], items: [], moves: [], abilities: {} };

function toggleMenu() {
    document.querySelector('.hamburger-btn').classList.toggle('active');
    document.getElementById('navMenu').classList.toggle('open');
}

async function init() {
    try {
        const fetchText = async (url) => {
            const r = await fetch(url);
            if (!r.ok) throw new Error(`${url} not found`);
            let t = await r.text();
            return JSON.parse(t.replace(/[\x00-\x1F\x7F]/g, "")); 
        };

        const [sp, mv, it, ab] = await Promise.all([
            fetchText('species_db_named2.json'),
            fetchText('moves_extracted2.json'),
            fetchText('items.json'),
            fetchText('abilities_db.json')
        ]);

        db.species = Object.keys(sp).map(k => ({ id: k, name: sp[k].Name, data: sp[k] }));
        db.moves = mv.map(m => ({ id: m.ID, name: m.Name, type: m.Type }));
        db.items = it.items.map(i => ({ id: i.id, name: i.name }));
        db.abilities = ab || {};

        setupSaveSlots();
        createPartyUI(); // UI作成を最後にする
    } catch (e) {
        console.error(e);
        alert("データの読み込みに失敗しました。ファイルパスやJSON形式を確認してください。");
    }
}

    ctx.fillStyle = "#333";
    ctx.font = "bold 32px sans-serif";

    const cards = document.querySelectorAll('.pokemon-card');
    const loadImages = [];

        ground: '#E0C068', flying: '#A890F0', psychic: '#F85888', bug: '#A8B820',
        rock: '#B8A038', ghost: '#705898', dragon: '#7038F8', dark: '#705848',
        steel: '#B8B8D0', fairy: '#EE99AC'
    };

    for (let i = 0; i < 6; i++) {
        const card = cards[i];
        const x = (i % 3) * 400 + 40;
        const y = Math.floor(i / 3) * 380 + 100;

        // カード外枠
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.roundRect(x, y, 380, 360, 10);
        ctx.fill();
        ctx.strokeStyle = "#ddd";
        ctx.stroke();

        const name = card.querySelector('.sp-input').value;
        const item = card.querySelector('.item-input').value;
        const abValue = card.querySelector('.ability-select').value;
        const abilityName = db.abilities[abValue]?.name || abValue || "---";
        const natureName = card.querySelector('.nature-select').value;
        const nature = NATURES[natureName] || {up:0, down:0};

        // --- アイコン読み込み処理 (IDベース: Icons/P/PIKACHU.png) ---
        // data-selected-id に保存されている英名ID（PIKACHU等）を取得
        const spId = card.querySelector('.sp-input').dataset.selectedId;

        if (spId) {
            // IDの1文字目（例：PIKACHU -> P）
            const initial = spId.charAt(0).toUpperCase();
            const img = new Image();
            
            // パス構築: Icons/P/PIKACHU.png
            img.src = `Icons/${initial}/${spId.toUpperCase()}.png`; 
            
            const p = new Promise((resolve) => {
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, 64, 64, x + 10, y + 10, 64, 64)
                    resolve();
                };
                img.onerror = () => {
                    console.warn(`Icon load failed: ${img.src}`);
                    resolve(); 
                };
            });
            loadImages.push(p);
        }

        // 1. 名前（右側にずらして表示）
        ctx.fillStyle = "#000";
        ctx.font = "bold 22px sans-serif";
        ctx.fillText(name || "???", x + 85, y + 40);
        
        // 2. 特性・持ち物
        ctx.font = "14px sans-serif";
        ctx.fillStyle = "#555";
        ctx.fillText(`特性: ${abilityName}`, x + 85, y + 65);
        ctx.fillText(`持: ${item || "なし"}`, x + 230, y + 65);

        // ステータス描画
        const totals = card.querySelectorAll('.total-display');
        const evs = card.querySelectorAll('.ev-input');
        const labels = ['H', 'A', 'B', 'C', 'D', 'S'];
        
        labels.forEach((label, j) => {
            const rowY = y + 105 + (j * 26);
            ctx.fillStyle = "#666";
            ctx.font = "14px monospace";
            ctx.fillText(label, x + 20, rowY);
            
            let statColor = "#000";
            if (j !== 0) {
                if (nature.up === j) statColor = "#d9534f";
                if (nature.down === j) statColor = "#0275d8";
            }
            
            ctx.fillStyle = statColor;
            ctx.font = "bold 17px monospace";
            ctx.fillText(totals[j].textContent.padStart(3, ' '), x + 45, rowY);

            const evVal = evs[j].value;
            if (evVal > 0) {
                ctx.fillStyle = "#28a745";
                ctx.font = "11px sans-serif";
                ctx.fillText(`(+${evVal})`, x + 85, rowY);
            }
        });

        // 技描画
        const moves = card.querySelectorAll('.move-input');
        moves.forEach((mv, j) => {
            const mName = mv.value;
            const mData = db.moves.find(m => m.name === mName);
            const mY = y + 105 + (j * 38);
            const mX = x + 165;

            ctx.fillStyle = (mData && mData.type) ? typeColors[mData.type.toLowerCase()] : "#eee";
            ctx.beginPath();
            ctx.roundRect(mX, mY, 195, 32, 4);
            ctx.fill();

            ctx.fillStyle = (mData) ? "#fff" : "#333";
            ctx.font = "bold 14px sans-serif";
            ctx.fillText(mName || "-", mX + 10, mY + 21);
        });

        // 調整メモ（改行・自動折り返し対応）
        const memo = card.querySelector('.memo-area').value;
        if (memo) {
            ctx.fillStyle = "#444";
            ctx.font = "12px sans-serif";
            const lineHeight = 16;
            const maxWidth = 340; // カードの幅に合わせた最大横幅
            const startX = x + 20;
            const startY = y + 285;
            
            // 改行コードで分割し、さらに長すぎる行を折り返す
            const lines = memo.split('\n');
            let displayLines = [];
            
            lines.forEach(line => {
                let currentLine = "";
                for (let char of line) {
                    let testLine = currentLine + char;
                    let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && currentLine !== "") {
                        displayLines.push(currentLine);
                        currentLine = char;
                    } else {
                        currentLine = testLine;
                    }
                }
                displayLines.push(currentLine);
            });

            // 最大3〜4行程度でクリップ（カードからはみ出さないよう制限）
            displayLines.slice(0, 4).forEach((line, index) => {
                ctx.fillText(line, startX, startY + (index * lineHeight));
            });
        }
    }

    // すべての画像読み込み完了を待機してからダウンロード
    await Promise.all(loadImages);

    const link = document.createElement('a');
    link.download = `${partyName}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
}

function setupSaveSlots() {
    const s = document.getElementById('saveSlot');
    s.innerHTML = ''; // 初期化
    for (let i = 1; i <= 50; i++) {
        const o = document.createElement('option');
        o.value = i;
        
        // localStorageから該当スロットのデータをチェック
        const storageKey = `p_slot_66_v3_${i}`;
        const raw = localStorage.getItem(storageKey);
        let displayName = `スロット ${i}`;
        
        if (raw) {
            try {
                const data = JSON.parse(raw);
                if (data.name) {
                    displayName = `${i}: ${data.name}`;
                }
            } catch (e) {
                console.error(`Error parsing slot ${i}`, e);
            }
        }
        
        o.textContent = displayName;
        s.appendChild(o);
    }
}

function toKatakana(str) {
    return str.replace(/[ぁ-ん]/g, s => String.fromCharCode(s.charCodeAt(0) + 0x60));
}

function updateMoveColor(input, type) {
    // 全てのタイプクラスを一度削除
    input.className = 'search-input move-input';
    if (type) {
        input.classList.add(`type-${type.toLowerCase()}`);
    }
}

function setupSearchableInput(container, dataList, onSelectCallback) {
    const input = container.querySelector('.search-input');
    const list = container.querySelector('.suggestion-list');

    input.addEventListener('input', () => {
        const query = toKatakana(input.value.toLowerCase());
        list.innerHTML = '';
        if (!query) { 
            list.style.display = 'none'; 
            if(input.classList.contains('move-input')) updateMoveColor(input, "");
            return; 
        }
        const filtered = dataList.filter(item => toKatakana(item.name).includes(query)).slice(0, 20);
        if (filtered.length > 0) {
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.textContent = item.name;
                div.onclick = () => {
                    input.value = item.name;
                    input.dataset.selectedId = item.id;
                    list.style.display = 'none';
                    if (onSelectCallback) onSelectCallback(item);
                    if (input.classList.contains('move-input')) updateMoveColor(input, item.type);
                };
                list.appendChild(div);
            });
            list.style.display = 'block';
        } else { list.style.display = 'none'; }
    });
    input.addEventListener('blur', () => {
        setTimeout(() => {
            list.style.display = 'none';
            // 手動入力時も色を反映させる
            if (input.classList.contains('move-input')) {
                const found = dataList.find(m => m.name === input.value);
                updateMoveColor(input, found ? found.type : "");
            }
        }, 200);
    });
}

function createPartyUI() {
    const grid = document.getElementById('partyGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 6; i++) {
        const card = document.createElement('div');
        card.className = 'pokemon-card';
        card.id = `pokemon-${i}`;
        card.innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                <div class="search-container">
                    <input type="text" class="search-input sp-input" placeholder="ポケモン名">
                    <div class="suggestion-list"></div>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input item-input" placeholder="持ち物">
                    <div class="suggestion-list"></div>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:5px;">
                <select class="ability-select"><option value="">特性</option></select>
                <select class="nature-select" onchange="calcStats(${i})">
                    <option value="まじめ">性格(無補正)</option>
                    ${Object.keys(NATURES).filter(n => n !== "まじめ").map(n => `<option value="${n}">${n}</option>`).join('')}
                </select>
            </div>
            <table class="stat-table">
                <thead><tr><th>能力</th><th>種族</th><th>努力</th><th>実数</th></tr></thead>
                ${['HP','攻撃','防御','特攻','特防','素早'].map((label, j) => `
                    <tr class="stats-row">
                        <td style="font-size:11px; color:#666;">${label}</td>
                        <td class="base-val">0</td>
                        <td><input type="number" class="ev-input" value="0" min="0" max="32" inputmode="numeric" oninput="validateEV(this, ${i})"></td>
                        <td class="total-display">0</td>
                    </tr>`).join('')}
            </table>
            <div class="ev-counter">努力値合計: <span class="ev-sum">0</span> / 66</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                ${[1,2,3,4].map(() => `
                    <div class="search-container">
                        <input type="text" class="search-input move-input" placeholder="技">
                        <div class="suggestion-list"></div>
                    </div>`).join('')}
            </div>
            <textarea class="memo-area" placeholder="調整メモ..."></textarea>
        `;
        grid.appendChild(card);

        setupSearchableInput(card.querySelector('.sp-input').parentNode, db.species, (item) => updateSpecies(i, item.data));
        setupSearchableInput(card.querySelector('.item-input').parentNode, db.items);
        card.querySelectorAll('.move-input').forEach(mvInput => setupSearchableInput(mvInput.parentNode, db.moves));

        card.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('focus', function() { this.select(); });
        });
    }
}


function updateSpecies(idx, speciesData) {
    const card = document.getElementById(`pokemon-${idx}`);
    if (!card || !speciesData) return;

    const name = speciesData.Name;
    const itemInput = card.querySelector('.item-input');
    
    // --- 追加：専用アイテムの自動設定 ---
    if (MEGA_STONE_MAP[name]) {
        const stoneName = MEGA_STONE_MAP[name];
        itemInput.value = stoneName;
        // db.itemsからIDも検索してデータセットに入れておく（保存用）
        const itemObj = db.items.find(i => i.name === stoneName);
        if (itemObj) itemInput.dataset.selectedId = itemObj.id;
    }

    // メガシンカ判定
    const isMega = name.startsWith("メガ") && !["メガヤンマ", "メガニウム"].includes(name);
    
    // 既存ボタンのクリーンアップ
    const container = card.querySelector('.sp-input').parentNode;
    const oldBtn = container.querySelector('.mega-toggle-btn');
    if (oldBtn) oldBtn.remove();

    if (isMega) {
        const btn = document.createElement('button');
        btn.className = 'mega-toggle-btn';
        btn.textContent = "メガシンカ前";
        btn.dataset.mode = "mega";
        btn.style.cssText = "width:100%; padding:4px; font-size:11px; margin-top:5px; background:#6c757d; color:white; border:none; border-radius:4px; cursor:pointer;";
        
        btn.onclick = (e) => {
            e.preventDefault();
            const isShowingMega = btn.dataset.mode === "mega";
            
            if (isShowingMega) {
                // メガシンカ解除時はアイテムを消すべきか？ 
                // 構築メモとしては残しておいたほうが親切なので、ここではアイテム操作はしない
                const baseName = name.replace("メガ", "").replace(/X$|Y$/, "");
                const baseSpecies = db.species.find(s => s.name === baseName);
                if (baseSpecies) {
                    applyStats(idx, baseSpecies.data);
                    btn.dataset.mode = "normal";
                    btn.textContent = "メガシンカ後へ";
                }
            } else {
                applyStats(idx, speciesData);
                btn.dataset.mode = "mega";
                btn.textContent = "メガシンカ前へ";
            }
        };
        container.appendChild(btn);
    }

    applyStats(idx, speciesData);
}

function applyStats(idx, data) {
    const card = document.getElementById(`pokemon-${idx}`);
    const bases = [data.HP, data.Atk, data.Def, data.SpAtk, data.SpDef, data.Speed];
    
    card.querySelectorAll('.base-val').forEach((td, i) => {
        td.textContent = bases[i] || 0;
    });
    
    const abSelect = card.querySelector('.ability-select');
    const abs = [...(data.Abilities || []), ...(data.HiddenAbilities || [])];
    abSelect.innerHTML = abs.map(a => `<option value="${a}">${db.abilities[a]?.name || a}</option>`).join('');
    
    calcStats(idx);
}

function validateEV(input, idx) {
    let val = parseInt(input.value);
    if (val > MAX_SINGLE_EV) input.value = MAX_SINGLE_EV;
    if (val < 0 || isNaN(val)) val = 0;
    const card = document.getElementById(`pokemon-${idx}`);
    const evs = [...card.querySelectorAll('.ev-input')];
    let sum = evs.reduce((acc, cur) => acc + (parseInt(cur.value) || 0), 0);
    const sumDisplay = card.querySelector('.ev-sum');
    sumDisplay.textContent = sum;
    sumDisplay.classList.toggle('ev-over', sum > MAX_TOTAL_EV);
    calcStats(idx);
}

function calcStats(idx) {
    const card = document.getElementById(`pokemon-${idx}`);
    const nature = NATURES[card.querySelector('.nature-select').value] || NATURES["まじめ"];
    const rows = card.querySelectorAll('.stats-row');

    rows.forEach((row, i) => {
        const base = parseInt(row.querySelector('.base-val').textContent) || 0;
        const iv = 31;
        const ev = parseInt(row.querySelector('.ev-input').value) || 0;
        let val = 0;
        if (i === 0) {
            val = (base === 1) ? 1 : Math.floor((base * 2 + iv) * 50 / 100) + 60 + ev;
        } else {
            let core = Math.floor((base * 2 + iv) * 50 / 100) + 5;
            val = Math.floor(core + ev); 
            if (nature.up === i) val = Math.floor(val * 1.1);
            if (nature.down === i) val = Math.floor(val * 0.9);
        }
        const display = row.querySelector('.total-display');
        display.textContent = val;
        display.className = 'total-display';
        if (i !== 0) {
            if (nature.up === i) display.classList.add('nature-up');
            if (nature.down === i) display.classList.add('nature-down');
        }
    });
}

function saveParty() {
    const slot = document.getElementById('saveSlot').value;
    const partyName = document.getElementById('partyName').value || `パーティ${slot}`;
    const partyMemo = document.getElementById('partyMemo').value;
    const storageKey = `p_slot_66_v3_${slot}`;
    const existingData = localStorage.getItem(storageKey);
    if (existingData && !confirm(`スロット ${slot} を上書きしますか？`)) return;

    const data = { name: partyName, partyMemo: partyMemo, members: [] };
    for (let i = 0; i < 6; i++) {
        const c = document.getElementById(`pokemon-${i}`);
        data.members.push({
            spName: c.querySelector('.sp-input').value,
            spId: c.querySelector('.sp-input').dataset.selectedId,
            itName: c.querySelector('.item-input').value,
            itId: c.querySelector('.item-input').dataset.selectedId,
            ab: c.querySelector('.ability-select').value,
            nt: c.querySelector('.nature-select').value,
            ev: [...c.querySelectorAll('.ev-input')].map(el => el.value),
            mv: [...c.querySelectorAll('.move-input')].map(el => ({ name: el.value, id: el.dataset.selectedId })),
            memo: c.querySelector('.memo-area').value
        });
    }
    localStorage.setItem(storageKey, JSON.stringify(data));
    
    // セレクトボックスの表示を更新
    const select = document.getElementById('saveSlot');
    const option = select.options[select.selectedIndex];
    option.textContent = `${slot}: ${partyName}`;
    alert("保存完了");
}

function deleteParty() {
    const slot = document.getElementById('saveSlot').value;
    const storageKey = `p_slot_66_v3_${slot}`;
    if (!localStorage.getItem(storageKey)) return;
    
    if (confirm(`スロット ${slot} のデータを削除しますか？`)) {
        localStorage.removeItem(storageKey);
        setupSaveSlots(); // リストを再構成
        alert("削除しました");
    }
}

function loadParty() {
    const slot = document.getElementById('saveSlot').value;
    const raw = localStorage.getItem(`p_slot_66_v3_${slot}`);
    if (!raw) return alert("データがありません");
    const data = JSON.parse(raw);
    document.getElementById('partyName').value = data.name;
    document.getElementById('partyMemo').value = data.partyMemo || "";
    data.members.forEach((m, i) => {
        const c = document.getElementById(`pokemon-${i}`);
        const spInp = c.querySelector('.sp-input');
        spInp.value = m.spName;
        spInp.dataset.selectedId = m.spId;
        const speciesObj = db.species.find(s => s.id === m.spId);
        if (speciesObj) updateSpecies(i, speciesObj.data);
        c.querySelector('.item-input').value = m.itName || "";
        c.querySelector('.item-input').dataset.selectedId = m.itId || "";
        c.querySelector('.nature-select').value = m.nt;
        c.querySelectorAll('.ev-input').forEach((el, j) => { el.value = m.ev[j]; validateEV(el, i); });
        c.querySelector('.ability-select').value = m.ab;
        c.querySelectorAll('.move-input').forEach((el, j) => {
            el.value = m.mv[j].name;
            el.dataset.selectedId = m.mv[j].id;
            const foundMove = db.moves.find(mv => mv.name === el.value);
            updateMoveColor(el, foundMove ? foundMove.type : "");
        });
        c.querySelector('.memo-area').value = m.memo || "";
    });
}

init();
</script>
